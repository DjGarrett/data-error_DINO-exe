<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Royale — Local Edition</title>
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-card: rgba(20, 20, 25, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-gold: #c5a880;
            --text-main: #f4f4f5;
            --text-muted: #71717a;
        }

        body {
            background-color: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .nav-header { max-width: 1000px; width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        .brand-title { font-size: 16px; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; margin: 0; }

        .main-layout { max-width: 1000px; width: 100%; display: grid; grid-template-columns: 1fr 300px; gap: 40px; }

        .altar-zone { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 8px; padding: 40px; min-height: 400px; display: flex; flex-direction: column; justify-content: space-between; }
        .stage-display { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: center; flex-grow: 1; margin-bottom: 40px; }
        
        .btn-action { background: transparent; color: var(--text-main); border: 1px solid rgba(255, 255, 255, 0.15); padding: 12px 24px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { background: var(--text-main); color: var(--bg-primary); }

        .character-card { background: #111113; border: 1px solid var(--border-color); width: 140px; border-radius: 6px; overflow: hidden; animation: cardAppear 0.5s both; }
        .image-container { width: 100%; height: 180px; background: #161619; }
        .character-img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; border-top: 1px solid var(--border-color); }
        .card-name { font-size: 11px; font-weight: 500; }
        .card-meta { font-size: 9px; color: var(--text-muted); }

        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .matrix-item { background: var(--bg-card); border: 1px dashed var(--border-color); border-radius: 6px; height: 233px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: rgba(255,255,255,0.1); font-size: 10px; }
        .matrix-item.unlocked { border-style: solid; background: transparent; }

        @keyframes cardAppear { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="nav-header">
        <h1 class="brand-title">ARCHETYPE // GACHA</h1>
    </div>

    <div class="main-layout">
        <div class="altar-zone">
            <div class="stage-display" id="stageDisplay">
                <span style="color:var(--text-muted)">A la espera de transmisiones</span>
            </div>
            <div style="display:flex; justify-content:center; gap:15px;">
                <button class="btn-action" onclick="draw(1)">Proyectar x1</button>
            </div>
        </div>

        <div class="collection-section" style="grid-column: 1 / span 2;">
            <div class="matrix-grid" id="matrixGrid"></div>
        </div>
    </div>

    <script>
        // --- TUS PERSONAJES LOCALES ---
        const CHARACTERS = [
            { id: 1, name: "Rias Gremory", series: "High School DxD", img: "rias.png" },
            { id: 2, name: "Saber", series: "Fate Series", img: "saber.png" },
            { id: 3, name: "2B", series: "NieR:Automata", img: "2b.png" }
        ];

        let ownedIds = JSON.parse(localStorage.getItem('my_gacha_owned')) || [];

        function buildCardHTML(c) {
            return `<div class="character-card">
                        <div class="image-container"><img src="${c.img}" class="character-img" onerror="this.style.display='none'"></div>
                        <div class="card-info"><div class="card-name">${c.name}</div><div class="card-meta">${c.series}</div></div>
                    </div>`;
        }

        function draw(amount) {
            const stage = document.getElementById('stageDisplay');
            stage.innerHTML = "";
            for (let i = 0; i < amount; i++) {
                const rolled = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
                if (!ownedIds.includes(rolled.id)) ownedIds.push(rolled.id);
                stage.innerHTML += buildCardHTML(rolled);
            }
            localStorage.setItem('my_gacha_owned', JSON.stringify(ownedIds));
            buildMatrixGrid();
        }

        function buildMatrixGrid() {
            const grid = document.getElementById('matrixGrid');
            grid.innerHTML = "";
            CHARACTERS.forEach(c => {
                const el = document.createElement('div');
                el.className = ownedIds.includes(c.id) ? "matrix-item unlocked" : "matrix-item";
                el.innerHTML = ownedIds.includes(c.id) ? buildCardHTML(c) : `<span>[ BLOQUEADO ]</span>`;
                grid.appendChild(el);
            });
        }

        buildMatrixGrid();
    </script>
</body>
</html>
